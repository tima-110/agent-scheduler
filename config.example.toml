# agent-handler configuration
# Copy to the platform config directory and edit:
#   macOS:  ~/Library/Application Support/agent-handler/config.toml
#   Linux:  ~/.config/agent-handler/config.toml
# Or pass --config /path/to/config.toml to any command.

# Hostname alias (optional — defaults to system hostname)
# Run `agent-handler whoami` to see the current value.
# hostname = "my-macbook"

[sheets]
gas_url = "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec"
# API key: store via `agent-handler set-credentials` or env var AGENT_HANDLER_GAS_KEY
name = "Sheet1"

# Paths (all support ~; defaults are platform-appropriate)
# Uncomment to override.
# [paths]
# tasks_csv = "~/.local/share/agent-handler/tasks.json"
# output_dir = "~/agent-output"
# state_db = "~/.local/share/agent-handler/state.db"
# log_file = "~/.local/log/agent-handler.log"

# Schedule backend: auto | cron | launchd
# [schedule]
# backend = "auto"
